name: Link Check

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Check repository links
        run: bun run check:links
