name: Merge Approved Submission PR

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      branch:
        description: Submission branch name
        required: true
        type: string
      issue_number:
        description: Source issue number
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: submission-pr-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  merge-pr:
    if: startsWith(inputs.branch, 'auto/submission-issue-')
    runs-on: ubuntu-latest
    steps:
      - name: Merge automated submission PR when checks are green
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          BRANCH: ${{ inputs.branch }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = Number(process.env.PR_NUMBER);
            const branch = process.env.BRANCH;
            const issueNumber = Number(process.env.ISSUE_NUMBER);

            for (let attempt = 1; attempt <= 24; attempt += 1) {
              const pulls = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: "open",
                head: `${owner}:${branch}`,
              });

              if (pulls.length === 0) {
                core.info(`No open PR found for automation branch ${branch}.`);
                return;
              }

              const pullRequest = pulls[0];
              const { data: checkRuns } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pullRequest.head.sha,
                per_page: 100,
              });

              const hasSubmissionValidation = checkRuns.check_runs.some(
                (checkRun) =>
                  checkRun.name === "Submission PR Validation" &&
                  checkRun.status === "completed" &&
                  checkRun.conclusion === "success",
              );
              const hasCodeQL = checkRuns.check_runs.some(
                (checkRun) =>
                  checkRun.name === "CodeQL" &&
                  checkRun.status === "completed" &&
                  checkRun.conclusion === "success",
              );
              const allChecksCompleted = checkRuns.check_runs.every(
                (checkRun) =>
                  checkRun.status === "completed" &&
                  ["success", "neutral", "skipped"].includes(checkRun.conclusion),
              );

              if (!hasSubmissionValidation || !hasCodeQL || !allChecksCompleted) {
                core.info(`Checks for PR #${pullNumber} are not all green yet (attempt ${attempt}/24).`);
                await new Promise((resolve) => setTimeout(resolve, 5000));
                continue;
              }

              const { data: pr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              if (pr.merged || pr.state === "closed") {
                core.info(`Pull request #${pullNumber} is already closed.`);
                return;
              }

              if (pr.mergeable === false && pr.mergeable_state === "behind") {
                core.info(
                  `Pull request #${pullNumber} is behind the base branch. Updating branch before merge.`,
                );
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });
                await new Promise((resolve) => setTimeout(resolve, 5000));
                continue;
              }

              if (
                pr.mergeable === null ||
                pr.mergeable_state === "unknown" ||
                pr.mergeable_state === "unstable"
              ) {
                core.info(
                  `Mergeability for PR #${pullNumber} is still being computed (attempt ${attempt}/24).`,
                );
                await new Promise((resolve) => setTimeout(resolve, 5000));
                continue;
              }

              if (pr.mergeable !== true) {
                core.setFailed(
                  `Pull request #${pullNumber} is not mergeable (state: ${pr.mergeable_state}).`,
                );
                return;
              }

              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pullNumber,
                merge_method: "squash",
                sha: pr.head.sha,
              });
              core.info(`Merged pull request #${pullNumber}.`);

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `An automated pull request has been merged for this approved submission: ${pr.html_url}`,
              });
              return;
            }

            core.setFailed(`Checks for PR #${pullNumber} did not turn green before timeout.`);
