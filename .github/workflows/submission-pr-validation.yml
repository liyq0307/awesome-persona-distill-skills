name: Submission PR Validation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: string
      branch:
        description: Submission branch name
        required: true
        type: string
      issue_number:
        description: Source issue number
        required: true
        type: string

permissions:
  actions: write
  contents: read

concurrency:
  group: submission-validation-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Submission PR Validation
    if: >-
      (github.event_name == 'pull_request' &&
      startsWith(github.event.pull_request.head.ref, 'auto/submission-issue-')) ||
      (github.event_name == 'workflow_dispatch' &&
      startsWith(inputs.branch, 'auto/submission-issue-'))
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check out submission branch
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Check formatting
        run: bun run format:check

      - name: Check repository links
        run: bun run check:links

      - name: Check repository consistency
        run: bun run check:consistency

      - name: Trigger merge workflow
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "merge-approved-submission-pr.yml",
              ref: inputs.branch,
              inputs: {
                pr_number: inputs.pr_number,
                branch: inputs.branch,
                issue_number: inputs.issue_number,
              },
            });
